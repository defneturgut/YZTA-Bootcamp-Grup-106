<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Günüm | Benim Dünyam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .tarih-serit {
    background: var(--warm-peach);
    border-radius: var(--radius-lg);
    padding: 16px 24px;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 24px;
    text-transform: capitalize;
  }

  .ilerleme-alani {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .ilerleme-cubugu-dis {
    flex: 1;
    background: var(--green-soft-light);
    border-radius: 20px;
    height: 22px;
    overflow: hidden;
  }

  .ilerleme-cubugu-ic {
    background: var(--success);
    height: 100%;
    width: 0%;
    border-radius: 20px;
    transition: width 0.35s ease;
  }

  #ilerlemeYuzde {
    font-family: var(--font-heading);
    font-weight: 700;
    min-width: 48px;
    text-align: right;
  }

  .ekleme-alani {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  #yeniGorevInput {
    flex: 1;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    border: 2px solid var(--green-soft);
    font-family: var(--font-body);
    font-size: 1rem;
  }

  #yeniGorevInput:focus-visible {
    outline: 3px solid var(--text-main);
  }

  .gorev-listesi {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .gorev-satiri {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--white);
    padding: 14px 18px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-soft);
  }

  .gorev-checkbox {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 3px solid var(--green-soft);
    background: white;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: background 0.15s ease;
}

  .gorev-checkbox.tamam {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }

  .gorev-metin {
    flex: 1;
    font-size: 1.05rem;
  }

  .gorev-metin.tamam {
    text-decoration: line-through;
    color: var(--text-soft);
  }

  .gorev-sil {
    background: none;
    border: none;
    font-size: 1.3rem;
    opacity: 0.5;
    transition: opacity 0.15s ease;
  }

  .gorev-sil:hover,
  .gorev-sil:focus-visible {
    opacity: 1;
  }

  .bos-durum {
    text-align: center;
    color: var(--text-soft);
    padding: 30px 10px;
  }

  .hazir-gorev-onerileri {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .oneri-btn {
    background: var(--blue-baby-light);
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-family: var(--font-body);
    font-size: 0.9rem;
  }

  .oneri-btn:hover,
  .oneri-btn:focus-visible {
    background: var(--blue-baby);
  }
</style>
</head>
<body>

<div class="uygulama">

  <nav class="kenar-menu" aria-label="Ana menü">
    <div class="logo"><span>🌈</span>Benim Dünyam</div>
    <a href="ana-sayfa.html" class="menu-link"><span class="ikon">🏠</span> Ana Sayfa</a>
    <a href="index.html" class="menu-link"><span class="ikon">😊</span> Duygu Kartları</a>
    <a href="diskalkuli.html" class="menu-link"><span class="ikon">🍎</span> Sayı Bahçesi</a>
    <a href="disleksi.html" class="menu-link"><span class="ikon">✏️</span> Yazı Atölyesi</a>
    <a href="takvim.html" class="menu-link aktif"><span class="ikon">📅</span> Günüm</a>
  </nav>

  <main class="icerik">
    <div class="ust-bar">
      <h1 style="margin:0;">📅 Günüm</h1>
      <div class="erisilebilirlik-cubugu">
        <span>Yazı Boyutu</span>
        <button class="font-btn" data-aksiyon="kucult" aria-label="Yazıyı küçült">A-</button>
        <button class="font-btn" data-aksiyon="sifirla" aria-label="Yazıyı sıfırla">A</button>
        <button class="font-btn" data-aksiyon="buyut" aria-label="Yazıyı büyüt">A+</button>
      </div>
    </div>

    <div class="tarih-serit" id="bugununTarihi">Bugün</div>

    <div class="kart">
      <div class="ilerleme-alani">
        <div class="ilerleme-cubugu-dis">
          <div class="ilerleme-cubugu-ic" id="ilerlemeCubugu"></div>
        </div>
        <span id="ilerlemeYuzde">0%</span>
      </div>

      <div class="ekleme-alani">
        <input type="text" id="yeniGorevInput" placeholder="Yeni görev yaz... (örn: Diş fırçala)" aria-label="Yeni görev">
        <button class="buton-birincil" id="ekleBtn">Ekle</button>
      </div>

      <!-- Hızlı ekleme için hazır öneriler - otizm spektrumundaki çocuklar için
           sık kullanılan rutinleri tek tıkla eklemek kolaylık sağlar -->
      <div class="hazir-gorev-onerileri">
        <button class="oneri-btn" data-gorev="Diş fırçala 🪥">+ Diş fırçala</button>
        <button class="oneri-btn" data-gorev="Kitap oku 📖">+ Kitap oku</button>
        <button class="oneri-btn" data-gorev="Ödev yap ✏️">+ Ödev yap</button>
        <button class="oneri-btn" data-gorev="Su iç 💧">+ Su iç</button>
      </div>

      <div class="gorev-listesi" id="gorevListesi">
        <!-- Görevler JS ile buraya eklenecek -->
      </div>
    </div>
  </main>
</div>

<script src="ortak.js"></script>
<script src="takvim.js"></script>
</body>
</html>
