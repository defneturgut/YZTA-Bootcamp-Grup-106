<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayı Bahçesi | Benim Dünyam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .soru-kart {
    text-align: center;
    padding: 36px 24px;
  }

  .soru-metni {
    font-family: var(--font-heading);
    font-size: 1.6rem;
    margin-bottom: 24px;
  }

  .meyve-alani {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    min-height: 90px;
  }

  .meyve-grubu {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .grup-kutusu {
    display: flex;
    gap: 4px;
    background: var(--green-soft-light);
    padding: 10px 14px;
    border-radius: var(--radius-md);
  }

  .meyve-emoji {
    font-size: 1.9rem;
  }

  .islem-isareti {
    font-family: var(--font-heading);
    font-size: 1.8rem;
    color: var(--text-soft);
  }

  .secenekler {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .secenek-btn {
    background: var(--blue-baby-light);
    border: 3px solid transparent;
    border-radius: var(--radius-md);
    padding: 16px 26px;
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-main);
    min-width: 80px;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .secenek-btn:hover,
  .secenek-btn:focus-visible {
    transform: translateY(-3px);
    background: var(--blue-baby);
  }

  .secenek-btn.dogru {
    background: var(--success);
    border-color: #4f9c72;
    color: white;
  }

  .secenek-btn.yanlis {
    background: var(--error);
    border-color: #c96f6f;
    color: white;
  }

  .geri-bildirim {
    margin-top: 20px;
    font-family: var(--font-heading);
    font-size: 1.2rem;
    min-height: 32px;
  }

  .skor-alani {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
  }

  .skor-kutu {
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 14px 22px;
    box-shadow: var(--shadow-soft);
    text-align: center;
    font-family: var(--font-heading);
    min-width: 100px;
  }

  .skor-sayi {
    font-size: 1.6rem;
    display: block;
  }
</style>
</head>
<body>

<div class="uygulama">

  <nav class="kenar-menu" aria-label="Ana menü">
    <div class="logo"><span>🌈</span>Benim Dünyam</div>
    <a href="ana-sayfa.html" class="menu-link"><span class="ikon">🏠</span> Ana Sayfa</a>
    <a href="index.html" class="menu-link"><span class="ikon">😊</span> Duygu Kartları</a>
    <a href="diskalkuli.html" class="menu-link aktif"><span class="ikon">🍎</span> Sayı Bahçesi</a>
    <a href="disleksi.html" class="menu-link"><span class="ikon">✏️</span> Yazı Atölyesi</a>
    <a href="takvim.html" class="menu-link"><span class="ikon">📅</span> Günüm</a>
  </nav>

  <main class="icerik">
    <div class="ust-bar">
      <h1 style="margin:0;">🍎 Sayı Bahçesi</h1>
      <div class="erisilebilirlik-cubugu">
        <span>Yazı Boyutu</span>
        <button class="font-btn" data-aksiyon="kucult" aria-label="Yazıyı küçült">A-</button>
        <button class="font-btn" data-aksiyon="sifirla" aria-label="Yazıyı sıfırla">A</button>
        <button class="font-btn" data-aksiyon="buyut" aria-label="Yazıyı büyüt">A+</button>
      </div>
    </div>

    <div class="kart soru-kart">
      <div class="soru-metni" id="soruMetni">Soru yükleniyor...</div>
      <div class="meyve-alani" id="meyveAlani"></div>
      <div class="secenekler" id="secenekler"></div>
      <div class="geri-bildirim" id="geriBildirim"></div>
    </div>

    <div class="skor-alani">
      <div class="skor-kutu" style="color: #4f9c72;">
        Doğru
        <span class="skor-sayi" id="dogruSayisi">0</span>
      </div>
      <div class="skor-kutu" style="color: #c96f6f;">
        Yanlış
        <span class="skor-sayi" id="yanlisSayisi">0</span>
      </div>
    </div>
  </main>
</div>

<script src="ortak.js"></script>
<script src="diskalkuli.js"></script>
</body>
</html>
