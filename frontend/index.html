<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugün Nasılsın? | Benim Dünyam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* Bu sayfaya özel stiller (giriş / duygu kapısı) */
  body.giris-body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .giris-kutu {
    max-width: 780px;
    width: 100%;
    text-align: center;
  }

  .giris-baslik {
    font-size: 2.2rem;
    margin-bottom: 6px;
  }

  .giris-alt-baslik {
    color: var(--text-soft);
    font-size: 1.1rem;
    margin-bottom: 32px;
  }

  .duygu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .duygu-karti {
    border: none;
    border-radius: var(--radius-lg);
    padding: 26px 12px;
    box-shadow: var(--shadow-soft);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text-main);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .duygu-karti .emoji {
    font-size: 3rem;
    /* Emojinin hafif "canlı" durması için ufak sallanma animasyonu */
    animation: hafif-sallanma 3.5s ease-in-out infinite;
  }

  @keyframes hafif-sallanma {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .duygu-karti:hover,
  .duygu-karti:focus-visible {
    transform: translateY(-6px) scale(1.04);
    box-shadow: 0 12px 24px rgba(80, 120, 110, 0.2);
  }

  .duygu-karti.secili {
    outline: 4px solid var(--text-main);
  }

  /* Her duygu kartına kendi rengi */
  .duygu-karti[data-duygu="mutlu"]   { background: var(--mood-happy); }
  .duygu-karti[data-duygu="iyi"]     { background: var(--mood-good); }
  .duygu-karti[data-duygu="uzgun"]   { background: var(--mood-sad); }
  .duygu-karti[data-duygu="kizgin"]  { background: var(--mood-angry); }
  .duygu-karti[data-duygu="endiseli"]{ background: var(--mood-anxious); }
  .duygu-karti[data-duygu="yorgun"]  { background: var(--mood-tired); }

  .devam-alani {
    margin-top: 34px;
    min-height: 60px;
  }

  #devamBtn {
    display: none;
    font-size: 1.1rem;
    padding: 14px 34px;
  }

  #devamBtn.gorunur {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    animation: yukari-belir 0.3s ease;
  }

  @keyframes yukari-belir {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    .duygu-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body class="giris-body">

  <div class="giris-kutu">
    <h1 class="giris-baslik" id="girisBaslik">Merhaba! 👋</h1>
    <p class="giris-alt-baslik" id="girisAltBaslik">Devam etmeden önce, bugün nasıl hissediyorsun?</p>

    <div class="duygu-grid" role="group" aria-label="Duygu seçimi">
      <button class="duygu-karti" data-duygu="mutlu" data-emoji="😄" data-metin="Mutluyum">
        <span class="emoji">😄</span>
        Mutluyum
      </button>
      <button class="duygu-karti" data-duygu="iyi" data-emoji="🙂" data-metin="İyiyim">
        <span class="emoji">🙂</span>
        İyiyim
      </button>
      <button class="duygu-karti" data-duygu="uzgun" data-emoji="😢" data-metin="Üzgünüm">
        <span class="emoji">😢</span>
        Üzgünüm
      </button>
      <button class="duygu-karti" data-duygu="kizgin" data-emoji="😠" data-metin="Kızgınım">
        <span class="emoji">😠</span>
        Kızgınım
      </button>
      <button class="duygu-karti" data-duygu="endiseli" data-emoji="😟" data-metin="Endişeliyim">
        <span class="emoji">😟</span>
        Endişeliyim
      </button>
      <button class="duygu-karti" data-duygu="yorgun" data-emoji="😴" data-metin="Yorgunum">
        <span class="emoji">😴</span>
        Yorgunum
      </button>
    </div>

    <div class="devam-alani">
      <button id="devamBtn" class="buton-birincil">Devam Et →</button>
    </div>
  </div>

<script src="ortak.js"></script>
<script>
  // Profil varsa çocuğun adıyla sıcak bir karşılama göster
  const profil = profilGetir();
  if (profil) {
    document.getElementById('girisBaslik').textContent = `Merhaba, ${profil.isim}! ${profil.avatar}`;
    document.getElementById('girisAltBaslik').textContent =
      `Devam etmeden önce ${profil.isim}, bugün nasıl hissediyorsun?`;
  }

  // Tüm duygu kartlarını seç
  const kartlar = document.querySelectorAll('.duygu-karti');
  const devamBtn = document.getElementById('devamBtn');
  let secilenKart = null;

  kartlar.forEach(kart => {
    kart.addEventListener('click', () => {
      // Önceki seçimi temizle
      kartlar.forEach(k => k.classList.remove('secili'));
      // Bu kartı seçili yap
      kart.classList.add('secili');
      secilenKart = kart;

      // Seçimi tarayıcı hafızasına kaydet (dashboard'da kullanılacak)
      localStorage.setItem('duyguEmoji', kart.dataset.emoji);
      localStorage.setItem('duyguMetin', kart.dataset.metin);
      localStorage.setItem('duyguZamani', new Date().toISOString());

      // "Devam Et" butonunu görünür yap
      devamBtn.classList.add('gorunur');
    });
  });

  devamBtn.addEventListener('click', () => {
    window.location.href = 'ana-sayfa.html';
  });
</script>
</body>
</html>
